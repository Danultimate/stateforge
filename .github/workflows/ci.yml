name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langchain,langgraph,encryption]"

      - name: Verify install
        run: |
          python -c "import stateforge; print('stateforge', stateforge.__version__)"
          python -c "import sqlcipher3; print('sqlcipher3 OK')"
          python -c "import langchain_core, langgraph; print('lc/lg OK')"

      - name: Run tests
        run: pytest -q --no-header
