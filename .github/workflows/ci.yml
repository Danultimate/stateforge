name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Bound a runaway hang: tests run in <1s locally; 10 min is generous.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    env:
      # langchain-core pulls in the langsmith pytest plugin which auto-loads
      # and can phone home on test collection / teardown. We don't want that
      # in CI — disable autoload entirely and re-enable only pytest-asyncio.
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      # Belt and suspenders: tell LangSmith / LangChain not to phone home
      # even if some path slips past the plugin disable.
      LANGSMITH_TRACING: "false"
      LANGSMITH_OTEL_ENABLED: "false"
      LANGCHAIN_TRACING_V2: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langchain,langgraph,encryption]"

      - name: Verify install
        run: |
          python -c "import stateforge; print('stateforge', stateforge.__version__)"
          python -c "import sqlcipher3; print('sqlcipher3 OK')"
          python -c "import langchain_core, langgraph; print('lc/lg OK')"

      # ─── Diagnostic split ────────────────────────────────────────────
      # We've seen the test phase hang past the job timeout twice with no
      # individual-test-timeout traceback firing. That means pytest never
      # reached a test (or stalled inside the very first one). Split the
      # phases so we can see exactly which boundary the hang lives at.
      - name: Pytest version + plugin set
        run: pytest --version

      - name: Collect only (import + collection check)
        timeout-minutes: 2
        run: pytest --collect-only -q --no-header

      - name: Run non-adapter tests
        timeout-minutes: 4
        run: |
          set -o pipefail
          mkdir -p logs
          # -s disables output capture so test-internal prints appear live.
          # --timeout=10 is tighter than before; if pytest-timeout still
          # doesn't fire, the test isn't getting interrupted at the Python
          # level (probably blocked in C / a sqlite call). The log file
          # captures stdout regardless so the artifact upload preserves it.
          pytest tests/ --ignore=tests/adapters \
            -v -s --tb=short --no-header \
            --timeout=10 --timeout-method=thread \
            -p pytest_asyncio.plugin -p pytest_timeout \
            2>&1 | tee logs/pytest-non-adapter.log

      - name: Run adapter tests
        if: success() || failure()
        timeout-minutes: 4
        run: |
          set -o pipefail
          mkdir -p logs
          pytest tests/adapters \
            -v -s --tb=short --no-header \
            --timeout=10 --timeout-method=thread \
            -p pytest_asyncio.plugin -p pytest_timeout \
            2>&1 | tee logs/pytest-adapter.log

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs-py${{ matrix.python-version }}-${{ matrix.os }}
          path: logs/
          if-no-files-found: warn
          retention-days: 14
