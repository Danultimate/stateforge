name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Bound a runaway hang: tests run in <1s locally; 10 min is generous.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    env:
      # langchain-core pulls in the langsmith pytest plugin which auto-loads
      # and can phone home on test collection / teardown. We don't want that
      # in CI — disable autoload entirely and re-enable only pytest-asyncio.
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      # Belt and suspenders: tell LangSmith / LangChain not to phone home
      # even if some path slips past the plugin disable.
      LANGSMITH_TRACING: "false"
      LANGSMITH_OTEL_ENABLED: "false"
      LANGCHAIN_TRACING_V2: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langchain,langgraph,encryption]"

      - name: Verify install
        run: |
          python -c "import stateforge; print('stateforge', stateforge.__version__)"
          python -c "import sqlcipher3; print('sqlcipher3 OK')"
          python -c "import langchain_core, langgraph; print('lc/lg OK')"

      - name: Run tests
        # Explicitly enable pytest-asyncio + pytest-timeout (autoload is off).
        # -v + --tb=short so a hung or failing test name surfaces live.
        # --timeout=20 with --timeout-method=thread kills any individual test
        # exceeding 20s and dumps a Python-level traceback showing exactly
        # where it's stuck — works even for async / asyncio.to_thread blocks.
        run: |
          pytest -v --tb=short --no-header \
            --timeout=20 --timeout-method=thread \
            -p pytest_asyncio.plugin -p pytest_timeout
